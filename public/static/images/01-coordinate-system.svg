<svg width="300" height="300" viewBox="-20 -30 320 320" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e; border-radius:12px;">
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2a2a4a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="200" height="200" fill="url(#grid)" stroke="#4a4a7a" stroke-width="1"/>

  <!-- Axes -->
  <line x1="0" y1="0" x2="210" y2="0" stroke="#7fdbca" stroke-width="1.5" marker-end="url(#arrowX)"/>
  <line x1="0" y1="0" x2="0" y2="210" stroke="#fc8eac" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <defs>
    <marker id="arrowX" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fdbca"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fc8eac"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="-5" y="-10" fill="#e0e0e0" font-size="13" font-family="monospace" font-weight="bold">(0, 0)</text>
  <text x="205" y="-5" fill="#7fdbca" font-size="12" font-family="monospace">x →</text>
  <text x="5" y="220" fill="#fc8eac" font-size="12" font-family="monospace">y ↓</text>
  <text x="155" y="218" fill="#8888aa" font-size="11" font-family="monospace">(200, 200)</text>

  <!-- Tick marks -->
  <line x1="50" y1="-3" x2="50" y2="3" stroke="#7fdbca" stroke-width="1"/>
  <text x="44" y="-8" fill="#7fdbca" font-size="9" font-family="monospace">50</text>
  <line x1="100" y1="-3" x2="100" y2="3" stroke="#7fdbca" stroke-width="1"/>
  <text x="92" y="-8" fill="#7fdbca" font-size="9" font-family="monospace">100</text>
  <line x1="150" y1="-3" x2="150" y2="3" stroke="#7fdbca" stroke-width="1"/>
  <text x="142" y="-8" fill="#7fdbca" font-size="9" font-family="monospace">150</text>
  <line x1="200" y1="-3" x2="200" y2="3" stroke="#7fdbca" stroke-width="1"/>
  <text x="192" y="-8" fill="#7fdbca" font-size="9" font-family="monospace">200</text>

  <line x1="-3" y1="50" x2="3" y2="50" stroke="#fc8eac" stroke-width="1"/>
  <line x1="-3" y1="100" x2="3" y2="100" stroke="#fc8eac" stroke-width="1"/>
  <line x1="-3" y1="150" x2="3" y2="150" stroke="#fc8eac" stroke-width="1"/>
  <line x1="-3" y1="200" x2="3" y2="200" stroke="#fc8eac" stroke-width="1"/>

  <!-- Example rect -->
  <rect x="30" y="40" width="80" height="60" fill="#6c5ce7" fill-opacity="0.7" rx="3"/>
  <text x="45" y="75" fill="white" font-size="11" font-family="monospace">rect</text>

  <!-- Example circle -->
  <circle cx="150" cy="130" r="35" fill="#fd79a8" fill-opacity="0.7"/>
  <text x="133" y="135" fill="white" font-size="11" font-family="monospace">circle</text>

  <!-- Dimension lines for rect -->
  <line x1="30" y1="40" x2="30" y2="35" stroke="#ffeaa7" stroke-width="0.8" stroke-dasharray="2,2"/>
  <circle cx="30" cy="40" r="3" fill="#ffeaa7"/>
  <text x="10" y="33" fill="#ffeaa7" font-size="8" font-family="monospace">(30,40)</text>
</svg>
