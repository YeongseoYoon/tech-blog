<svg width="620" height="280" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e; border-radius:12px;">
  <!-- Left: Before transform -->
  <text x="150" y="25" fill="#e0e0e0" font-size="13" font-family="monospace" text-anchor="middle" font-weight="bold">transform 전</text>

  <svg x="10" y="40" width="280" height="230" viewBox="-140 -115 280 230">
    <!-- Grid -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke="#3a3a5a" stroke-width="0.5"/>
    <line x1="0" y1="-115" x2="0" y2="115" stroke="#3a3a5a" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#7fdbca"/>
    <text x="5" y="-5" fill="#7fdbca" font-size="9" font-family="monospace">(0,0)</text>

    <!-- Original rect -->
    <rect x="20" y="20" width="60" height="40" fill="#6c5ce7" fill-opacity="0.8" rx="3"/>
    <text x="30" y="45" fill="white" font-size="9" font-family="monospace">rect</text>
    <circle cx="20" cy="20" r="2.5" fill="#ffeaa7"/>
    <text x="25" y="16" fill="#ffeaa7" font-size="8" font-family="monospace">(20,20)</text>
  </svg>

  <!-- Right: After translate(50, 30) rotate(45) -->
  <text x="470" y="25" fill="#e0e0e0" font-size="13" font-family="monospace" text-anchor="middle" font-weight="bold">translate(50,30) rotate(45)</text>

  <svg x="330" y="40" width="280" height="230" viewBox="-140 -115 280 230">
    <!-- Grid -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke="#3a3a5a" stroke-width="0.5"/>
    <line x1="0" y1="-115" x2="0" y2="115" stroke="#3a3a5a" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#7fdbca" opacity="0.4"/>
    <text x="5" y="-5" fill="#7fdbca" font-size="9" font-family="monospace" opacity="0.4">(0,0)</text>

    <!-- Show translated origin -->
    <line x1="0" y1="0" x2="50" y2="30" stroke="#ffeaa7" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Transformed coordinate system -->
    <g transform="translate(50, 30)">
      <!-- New origin -->
      <circle cx="0" cy="0" r="3" fill="#ffeaa7"/>
      <text x="5" y="-5" fill="#ffeaa7" font-size="8" font-family="monospace">새 원점</text>

      <!-- Rotated axes -->
      <g transform="rotate(45)">
        <line x1="-30" y1="0" x2="90" y2="0" stroke="#7fdbca" stroke-width="0.8" stroke-dasharray="2,2"/>
        <line x1="0" y1="-30" x2="0" y2="70" stroke="#fc8eac" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="75" y="-5" fill="#7fdbca" font-size="7" font-family="monospace">x'</text>
        <text x="4" y="65" fill="#fc8eac" font-size="7" font-family="monospace">y'</text>

        <!-- Rotated rect (same coordinates!) -->
        <rect x="20" y="20" width="60" height="40" fill="#6c5ce7" fill-opacity="0.8" rx="3"/>
        <text x="30" y="45" fill="white" font-size="9" font-family="monospace">rect</text>
      </g>
    </g>

    <!-- Annotation -->
    <text x="-130" y="100" fill="#aaa" font-size="8" font-family="monospace">좌표계가 이동+회전 →</text>
    <text x="-130" y="112" fill="#aaa" font-size="8" font-family="monospace">rect의 좌표는 그대로!</text>
  </svg>

  <!-- Arrow between -->
  <line x1="295" y1="150" x2="325" y2="150" stroke="#ffeaa7" stroke-width="2" marker-end="url(#arrowMid)"/>
  <defs>
    <marker id="arrowMid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffeaa7"/>
    </marker>
  </defs>
</svg>
